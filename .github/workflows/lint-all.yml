name: Lint Portal UI

on:
  push:
    branches:
      - master
      - '**/AUS*'

  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: 24
      - run: npm install
      - run: npm run lint
